name: Build Axelord OS (Debian)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --privileged
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          # Install live-build and tools to compile your C++ flasher
          apt-get install -y live-build xorriso g++ libudev-dev qtbase5-dev

      - name: Compile Axelord Flasher
        run: |
          # Compile your C++ code
          # Assuming your source is in src/flasher.cpp
          g++ -o axelord-flasher src/main.cpp -ludev -lQt5Core -lQt5Widgets
          
          # Place the binary into the includes directory so it's copied to the ISO
          mkdir -p config/includes.chroot/usr/bin
          mv axelord-flasher config/includes.chroot/usr/bin/axelord-flasher

      - name: Configure ISO build
        run: |
          lb config \
            --mode debian \
            --distribution bookworm \
            --bootloaders grub-efi \
            --binary-images iso-hybrid \
            --archive-areas "main contrib non-free"

      - name: Build ISO
        run: |
          lb build

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: axelord-os-iso
          path: "*.iso"
          
