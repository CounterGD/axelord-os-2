name: Build Axelord OS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm archiso mkinitcpio

      - name: Verify hooks
        run: |
          # Debugging step to ensure hooks are installed in the correct location
          echo "Checking for archiso hooks..."
          ls -l /usr/lib/initcpio/hooks/archiso
          ls -l /usr/lib/initcpio/install/archiso

      - name: Build ISO
        run: |
          # Run mkarchiso with verbose output
          mkarchiso -v -w /tmp/work -o ./out .

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: axelord-os-iso
          path: out/*.iso
          
