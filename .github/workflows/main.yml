name: Build Axelord OS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm archiso mkinitcpio-archiso

      - name: Fix mkinitcpio configuration
        run: |
          # Overwrite the profile's mkinitcpio.conf with standard archiso hooks
          # This ensures 'archiso' is in the HOOKS list, which prevents the 
          # "failed to detect root filesystem" error.
          echo "HOOKS=(base udev memdisk archiso archiso_loop_mnt archiso_kms modconf block filesystems keyboard)" > airootfs/etc/mkinitcpio.conf

      - name: Build ISO
        run: |
          # Use the current directory as the profile path
          mkarchiso -v -w /tmp/work -o ./out .

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: axelord-os-iso
          path: out/*.iso
          
