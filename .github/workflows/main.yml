name: Build Axelord OS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # Ensure both archiso and the specific mkinitcpio hooks are installed
          pacman -Sy --noconfirm archiso mkinitcpio-archiso

      - name: Verify hooks existence
        run: |
          # Confirm hooks are present before building
          if [ ! -f /usr/lib/initcpio/hooks/archiso ]; then
            echo "Error: Archiso hooks not found!"
            exit 1
          fi
          echo "Archiso hooks found successfully."

      - name: Build ISO
        run: |
          mkarchiso -v -w /tmp/work -o ./out .

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: axelord-os-iso
          path: out/*.iso
          
